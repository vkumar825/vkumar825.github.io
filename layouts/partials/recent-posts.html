<h2>Recent Posts</h2>
<div class="recent-posts">
  {{ range first 5 (where .Site.RegularPages "Type" "blog") }}
    <div class="post-entry">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <br>
      <span class="date">{{ .Date.Format "Jan 2, 2006" }}</span>
    </div>
  {{ end }}
</div>

<style>
.recent-posts {
  display: flex;
  flex-direction: column;
  gap: 15px;
}
</style>
